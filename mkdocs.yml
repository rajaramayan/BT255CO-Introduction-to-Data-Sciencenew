# =============================================================================
#  MkDocs Configuration — BT255CO Introduction to Data Science
#  Course Lecture Book | GitHub Pages Deployment
# =============================================================================

# ---------------------------------------------------------------------------
# Site Information
# ---------------------------------------------------------------------------
site_name: "BT255CO · Introduction to Data Science"
site_description: >
  Complete lecture notes for BT255CO — Introduction to Data Science.
  Covers data science fundamentals, data wrangling, exploratory analysis,
  and machine learning basics.
site_author: "Dr. Instructor Name"
site_url: "https://rajaramayan.github.io/BT255CO-Introduction-to-Data-Sciencenew/"

# ---------------------------------------------------------------------------
# Repository
# ---------------------------------------------------------------------------
repo_name: "rajaramayan/BT255CO-Introduction-to-Data-Sciencenew"
repo_url: "https://github.com/rajaramayan/BT255CO-Introduction-to-Data-Sciencenew"
edit_uri: "edit/main/docs/"

# ---------------------------------------------------------------------------
# Theme — Material for MkDocs
# ---------------------------------------------------------------------------
theme:
  name: material

  # ---- Color Palette (Light / Dark toggle) --------------------------------
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  # ---- Typography ----------------------------------------------------------
  font:
    text: Roboto
    code: Roboto Mono

  # ---- Features ------------------------------------------------------------
  features:
    # Navigation
    - navigation.tabs           # top-level tabs
    - navigation.tabs.sticky    # tabs stay visible while scrolling
    - navigation.sections       # group nav items under sections
    - navigation.expand         # expand all sections by default
    - navigation.path           # breadcrumb navigation
    - navigation.indexes        # section index pages
    - navigation.top            # back-to-top button

    # Search
    - search.suggest            # auto-complete suggestions
    - search.highlight          # highlight search terms on page
    - search.share              # shareable search link

    # Content
    - content.code.copy         # copy button on code blocks
    - content.code.annotate     # code annotations
    - content.tabs.link         # link content tabs
    - content.tooltips          # hover tooltips

    # TOC
    - toc.follow                # sidebar TOC follows scroll

  # ---- Icons & Logo --------------------------------------------------------
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  # Uncomment and add your logo/favicon to docs/assets/
  # logo: assets/logo.png
  # favicon: assets/favicon.png

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  # Uncomment if you install mkdocs-mermaid2-plugin (see requirements.txt)
  # - mermaid2

# ---------------------------------------------------------------------------
# Markdown Extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  # ---- Standard extensions ------------------------------------------------
  - abbr                          # abbreviations
  - admonition                    # note / tip / warning boxes
  - attr_list                     # add HTML attributes to elements
  - def_list                      # definition lists
  - footnotes                     # footnotes [^1]
  - md_in_html                    # markdown inside HTML blocks
  - tables                        # pipe tables

  # ---- Table of Contents ---------------------------------------------------
  - toc:
      permalink: true             # anchor links on headings
      title: "On this page"

  # ---- PyMdown Extensions --------------------------------------------------
  - pymdownx.arithmatex:          # LaTeX math via MathJax
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret                # superscript ^sup^
  - pymdownx.critic               # CriticMarkup
  - pymdownx.details              # collapsible <details> blocks
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:           # syntax highlighting
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite         # inline `#!python code` highlighting
  - pymdownx.keys                 # keyboard keys ++ctrl+c++
  - pymdownx.mark                 # ==highlighted text==
  - pymdownx.smartsymbols         # auto typography symbols
  - pymdownx.snippets:            # include external files
      auto_append:
        - assets/abbreviations.md
  - pymdownx.superfences:         # fenced code blocks + mermaid
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:              # tabbed content blocks
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:            # - [x] checklists
      custom_checkbox: true
  - pymdownx.tilde                # subscript ~sub~

# ---------------------------------------------------------------------------
# Extra JavaScript
# ---------------------------------------------------------------------------
extra_javascript:
  # MathJax configuration (must come before MathJax loader)
  - assets/extra.js
  # MathJax v3 CDN
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# ---------------------------------------------------------------------------
# Extra CSS
# ---------------------------------------------------------------------------
extra_css:
  - assets/extra.css

# ---------------------------------------------------------------------------
# Extra / Social / Analytics
# ---------------------------------------------------------------------------
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rajaramayan
      name: GitHub Repository
    - icon: fontawesome/solid/envelope
      link: mailto:instructor@university.edu
      name: Contact Instructor
  # Google Analytics (replace G-XXXXXXXXXX with your real ID)
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
  generator: false          # hide "Made with Material for MkDocs" footer

